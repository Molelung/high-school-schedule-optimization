<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中课程安排优化设计研究</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Loading state */
        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-primary, #F8F7F4); z-index: 9999;
            font-size: 24px; color: var(--text-muted, #8E8E93);
        }
        .loading-screen.hidden { display: none; }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">加载中...</div>
    
    <div class="progress-bar" id="progressBar"></div>
    <button class="page-nav-btn" id="pageNavBtn">页面</button>
    <button class="fullscreen-btn" id="fullscreenBtn" title="全屏 (F11)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        全屏
    </button>
    <div class="page-sidebar" id="pageSidebar">
        <button class="page-sidebar-close" id="pageSidebarClose">×</button>
        <div class="page-sidebar-title">页面导航</div>
    </div>
    
    <div class="slides-container" id="slidesContainer"></div>

    <script>
        // Slide files to load
        const SLIDE_FILES = [
            'slides/00-ready.html',
            'slides/01-cover.html',
            'slides/02-toc.html',
            'slides/03-background.html',
            'slides/04-literature.html',
            'slides/05-questions.html',
            'slides/06-methods.html',
            'slides/07-analysis.html',
            'slides/08-discussion.html',
            'slides/09-conclusion.html',
            'slides/10-reflection.html',
            'slides/11-defense.html',
            'slides/12-thanks.html'
        ];

        async function loadAllSlides() {
            const container = document.getElementById('slidesContainer');
            
            for (let i = 0; i < SLIDE_FILES.length; i++) {
                try {
                    const response = await fetch(SLIDE_FILES[i]);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const html = await response.text();
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper' + (i === 0 ? ' active' : '');
                    wrapper.setAttribute('data-slide-index', i.toString());
                    wrapper.innerHTML = '<div class="slide">' + html + '</div>';
                    container.appendChild(wrapper);
                } catch (err) {
                    console.error(`Failed to load ${SLIDE_FILES[i]}:`, err);
                }
            }
            
            // Hide loading screen
            document.getElementById('loadingScreen').classList.add('hidden');
            
            // Call initApp from script.js
            if (typeof initApp === 'function') {
                initApp();
            } else {
                console.error('initApp function not found');
            }
        }

        // Load slides when DOM is ready
        document.addEventListener('DOMContentLoaded', loadAllSlides);
    </script>
    <script src="script.js"></script>
</body>
</html>
