<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中课程安排优化设计研究</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .slides-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .slide-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease-in-out; pointer-events: none; }
        .slide-wrapper.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    <button class="page-nav-btn" id="pageNavBtn">页面</button>
    <button class="fullscreen-btn" id="fullscreenBtn" title="全屏 (F11)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        全屏
    </button>
    <div class="page-sidebar" id="pageSidebar">
        <button class="page-sidebar-close" id="pageSidebarClose">×</button>
        <div class="page-sidebar-title">页面导航</div>
    </div>
    <div class="slides-container" id="slidesContainer">
        <!-- Slides will be loaded dynamically -->
    </div>
    <script src="script.js"></script>
    <script>
        const slideFiles = [
            'slides/00-ready.html',
            'slides/01-cover.html',
            'slides/02-toc.html',
            'slides/03-background.html',
            'slides/04-literature.html',
            'slides/05-questions.html',
            'slides/06-methods.html',
            'slides/07-analysis.html',
            'slides/08-discussion.html',
            'slides/09-conclusion.html',
            'slides/10-reflection.html',
            'slides/11-defense.html',
            'slides/12-thanks.html'
        ];

        async function loadSlides() {
            const container = document.getElementById('slidesContainer');
            
            for (let i = 0; i < slideFiles.length; i++) {
                try {
                    const response = await fetch(slideFiles[i]);
                    const html = await response.text();
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'slide-wrapper' + (i === 0 ? ' active' : '');
                    wrapper.setAttribute('data-slide-index', i);
                    wrapper.innerHTML = '<div class="slide">' + html + '</div>';
                    
                    container.appendChild(wrapper);
                } catch (error) {
                    console.error('Failed to load ' + slideFiles[i] + ':', error);
                }
            }
            
            if (typeof initApp === 'function') {
                initApp();
            }
        }

        document.addEventListener('DOMContentLoaded', loadSlides);
    </script>
</body>
</html>
