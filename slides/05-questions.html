<h2>研究问题</h2>
    
    <!-- 主问题 = 论文标题，卡片容器包裹 -->
    <div class="main-question" id="main-question" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 56px 80px; box-shadow: var(--shadow-lg); max-width: 92%; font-size: 64px; white-space: nowrap;">
        深圳中学课程安排现状及优化建议
    </div>
    
    <!-- 四个子问题 - 统一左对齐 -->
    <div class="sub-questions" id="sub-questions">
        <div class="sub-q-card" style="border-top: 4px solid var(--morandi-blue); font-size: 36px; text-align: left; padding: 36px 40px; min-height: 200px; display: flex; align-items: center;">
            文科连堂或理科连堂对学生学习有何影响？
        </div>
        <div class="sub-q-card" style="border-top: 4px solid var(--morandi-green); font-size: 36px; text-align: left; padding: 36px 40px; min-height: 200px; display: flex; align-items: center;">
            主科与副科学习之间是否存在冲突，应如何解决？
        </div>
        <div class="sub-q-card" style="border-top: 4px solid var(--morandi-pink); font-size: 36px; text-align: left; padding: 36px 40px; min-height: 200px; display: flex; align-items: center;">
            基于时段对课程进行优化是否必要，应如何优化？
        </div>
        <div class="sub-q-card" style="border-top: 4px solid var(--morandi-purple); font-size: 36px; text-align: left; padding: 36px 40px; min-height: 200px; display: flex; align-items: center;">
            选科是否对课程编排产生影响？
        </div>
    </div>
